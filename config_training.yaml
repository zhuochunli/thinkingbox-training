mcp_proxy:
  endpoint_url: "http://127.0.0.1:7111"
  timeout: 300.0

orchestrator:
  type: thinkingbox
  agent_model:
    # OpenAI-Compatible Chat Completions, DeepSeek style reasoning_content
    type: aoai
    deployment: "Qwen/Qwen3.5-9B"  # served model name
    endpoint_url: "http://127.0.0.1:8000/v1/chat/completions"
    is_reasoning: true
    temperature: 1.0
    max_completion_tokens: 4096
    timeout: 600.0

judge_model:
  type: aoai
  credential:
    type: az-cli
  account_name: "aoai-l-eastus2"
  deployment: "gpt-5.4-mini-no-filter"
  temperature: 0.0
  seed: 42
  max_completion_tokens: 128
  api_version: "2025-04-01-preview"
  timeout: 600.0

judge_type: "legacy" # "motivation"

user_model:
  type: aoai
  credential:
    type: az-cli
  account_name: "aoai-l-eastus2"
  deployment: "gpt-5.4-mini-no-filter"
  temperature: 0.3
  max_completion_tokens: 4096
  api_version: "2025-04-01-preview"
  timeout: 600.0
